name: Deploy to GitHub Pages

on:
  # Runs on every push to main (i.e. every time you publish a post)
  push:
    branches: [main]
  # Lets you re-run the deploy manually from the Actions tab
  workflow_dispatch:

# Allow this workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm install` instead of `npm ci`: the lockfile is generated on macOS and
      # omits Linux-only optional deps (npm cross-platform bug), which makes
      # `npm ci` fail on ubuntu runners.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      # Runs `astro build && pagefind --site dist` (pagefind builds the search index)
      - name: Build site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
